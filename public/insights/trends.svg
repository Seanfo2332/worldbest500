<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533">
  <defs>
    <radialGradient id="tr-space" cx="42%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0c1520"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>
    <radialGradient id="tr-earth" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#c0d0d8"/>
      <stop offset="18%" stop-color="#8aaab8"/>
      <stop offset="42%" stop-color="#4e6878"/>
      <stop offset="68%" stop-color="#253848"/>
      <stop offset="88%" stop-color="#0e1e2a"/>
      <stop offset="100%" stop-color="#050c12"/>
    </radialGradient>
    <radialGradient id="tr-atm" cx="50%" cy="50%" r="50%">
      <stop offset="76%" stop-color="transparent"/>
      <stop offset="86%" stop-color="#4880a8" stop-opacity="0.4"/>
      <stop offset="93%" stop-color="#3060a0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="tr-shine" cx="28%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="tr-clip"><circle cx="470" cy="290" r="218"/></clipPath>
  </defs>

  <!-- Space -->
  <rect width="800" height="533" fill="url(#tr-space)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="38" cy="48" r="0.8" opacity="0.5"/>
    <circle cx="112" cy="115" r="0.5" opacity="0.65"/>
    <circle cx="175" cy="28" r="1" opacity="0.4"/>
    <circle cx="52" cy="196" r="0.6" opacity="0.5"/>
    <circle cx="140" cy="318" r="0.7" opacity="0.35"/>
    <circle cx="22" cy="416" r="0.5" opacity="0.6"/>
    <circle cx="88" cy="475" r="0.9" opacity="0.3"/>
    <circle cx="735" cy="42" r="0.7" opacity="0.5"/>
    <circle cx="768" cy="162" r="0.5" opacity="0.45"/>
    <circle cx="712" cy="435" r="0.6" opacity="0.55"/>
    <circle cx="208" cy="498" r="0.5" opacity="0.3"/>
    <circle cx="58" cy="348" r="0.4" opacity="0.45"/>
    <circle cx="748" cy="308" r="0.8" opacity="0.3"/>
    <circle cx="642" cy="58" r="0.5" opacity="0.5"/>
    <circle cx="158" cy="452" r="0.6" opacity="0.4"/>
    <circle cx="308" cy="18" r="0.7" opacity="0.55"/>
  </g>

  <!-- Earth sphere -->
  <circle cx="470" cy="290" r="218" fill="url(#tr-earth)"/>

  <!-- Surface detail: land + cloud shapes -->
  <g clip-path="url(#tr-clip)">
    <ellipse cx="430" cy="225" rx="90" ry="55" fill="#4e6878" opacity="0.55" transform="rotate(-18 430 225)"/>
    <ellipse cx="520" cy="205" rx="58" ry="40" fill="#486070" opacity="0.42"/>
    <ellipse cx="378" cy="338" rx="74" ry="46" fill="#4c6272" opacity="0.48" transform="rotate(22 378 338)"/>
    <ellipse cx="548" cy="348" rx="50" ry="34" fill="#476070" opacity="0.38"/>
    <ellipse cx="418" cy="398" rx="38" ry="24" fill="#436070" opacity="0.32"/>
    <!-- Polar ice -->
    <ellipse cx="470" cy="82" rx="125" ry="24" fill="#ccdae2" opacity="0.6"/>
    <ellipse cx="470" cy="500" rx="142" ry="18" fill="#c0ccd4" opacity="0.35"/>
    <!-- Cloud arcs -->
    <ellipse cx="510" cy="158" rx="98" ry="42" fill="#b8ccd6" opacity="0.55" transform="rotate(28 510 158)"/>
    <ellipse cx="362" cy="298" rx="76" ry="36" fill="#b0c8d2" opacity="0.42" transform="rotate(-22 362 298)"/>
    <ellipse cx="480" cy="382" rx="60" ry="30" fill="#a8c0ca" opacity="0.35" transform="rotate(12 480 382)"/>
    <!-- Specular highlight (lit side) -->
    <rect x="252" y="72" width="436" height="436" fill="url(#tr-shine)"/>
  </g>

  <!-- Atmospheric halo -->
  <circle cx="470" cy="290" r="222" fill="url(#tr-atm)"/>
  <circle cx="470" cy="290" r="226" fill="none" stroke="#5088a8" stroke-width="3" opacity="0.18"/>
  <circle cx="470" cy="290" r="230" fill="none" stroke="#3870a0" stroke-width="2" opacity="0.08"/>

  <!-- City lights on dark limb -->
  <g clip-path="url(#tr-clip)" fill="#ffe8a0" opacity="0.5">
    <circle cx="408" cy="352" r="1.8"/>
    <circle cx="424" cy="362" r="1.2"/>
    <circle cx="438" cy="368" r="1.5"/>
    <circle cx="452" cy="356" r="1"/>
    <circle cx="384" cy="368" r="1.4"/>
    <circle cx="396" cy="378" r="1"/>
    <circle cx="370" cy="382" r="1.1"/>
    <circle cx="462" cy="372" r="1.3"/>
    <circle cx="476" cy="364" r="0.9"/>
    <circle cx="418" cy="380" r="0.8"/>
    <circle cx="444" cy="376" r="1"/>
  </g>
</svg>
