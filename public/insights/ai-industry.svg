<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533">
  <defs>
    <linearGradient id="ai-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="55%" stop-color="#101418"/>
      <stop offset="100%" stop-color="#1a2028"/>
    </linearGradient>
    <linearGradient id="ai-left-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c2028"/>
      <stop offset="60%" stop-color="#2e3840"/>
      <stop offset="100%" stop-color="#242a32"/>
    </linearGradient>
    <linearGradient id="ai-right-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#323c46"/>
      <stop offset="40%" stop-color="#4a5660"/>
      <stop offset="100%" stop-color="#283038"/>
    </linearGradient>
    <linearGradient id="ai-center-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505e6a"/>
      <stop offset="30%" stop-color="#3a4852"/>
      <stop offset="70%" stop-color="#2a3840"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <linearGradient id="ai-glass-sheen" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Window grid filter -->
    <pattern id="ai-wins-left" x="0" y="0" width="22" height="18" patternUnits="userSpaceOnUse">
      <rect width="22" height="18" fill="none"/>
      <rect x="1" y="1" width="19" height="15" fill="#38454f" opacity="0.6"/>
      <rect x="1" y="1" width="19" height="15" fill="none" stroke="#1a2530" stroke-width="0.5"/>
    </pattern>
    <pattern id="ai-wins-center" x="0" y="0" width="28" height="20" patternUnits="userSpaceOnUse">
      <rect width="28" height="20" fill="none"/>
      <rect x="1" y="1" width="25" height="17" fill="#485868" opacity="0.55"/>
      <rect x="1" y="1" width="25" height="17" fill="none" stroke="#202c38" stroke-width="0.5"/>
    </pattern>
    <pattern id="ai-wins-right" x="0" y="0" width="22" height="18" patternUnits="userSpaceOnUse">
      <rect width="22" height="18" fill="none"/>
      <rect x="1" y="1" width="19" height="15" fill="#405060" opacity="0.55"/>
      <rect x="1" y="1" width="19" height="15" fill="none" stroke="#1a2530" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="533" fill="url(#ai-sky)"/>

  <!-- Far background towers (distant, very dark) -->
  <rect x="80" y="120" width="90" height="413" fill="#141820" opacity="0.8"/>
  <rect x="650" y="160" width="80" height="373" fill="#141820" opacity="0.7"/>
  <rect x="0" y="200" width="60" height="333" fill="#101418" opacity="0.6"/>
  <rect x="720" y="230" width="80" height="303" fill="#101418" opacity="0.6"/>

  <!-- LEFT building face (converging left) -->
  <polygon points="120,533 320,0 400,0 400,533" fill="url(#ai-left-face)"/>
  <polygon points="120,533 320,0 400,0 400,533" fill="url(#ai-wins-left)"/>

  <!-- CENTER building face -->
  <polygon points="320,0 480,0 480,533 320,533" fill="url(#ai-center-face)"/>
  <polygon points="320,0 480,0 480,533 320,533" fill="url(#ai-wins-center)"/>

  <!-- RIGHT building face (converging right) -->
  <polygon points="400,0 680,533 480,533 480,0" fill="url(#ai-right-face)"/>
  <polygon points="400,0 680,533 480,533 480,0" fill="url(#ai-wins-right)"/>

  <!-- Glass sheen overlay on all faces -->
  <polygon points="120,533 320,0 480,0 680,533" fill="url(#ai-glass-sheen)"/>

  <!-- Edge highlight lines (corners of building) -->
  <line x1="320" y1="0" x2="120" y2="533" stroke="#6a7e8a" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="0" x2="680" y2="533" stroke="#6a7e8a" stroke-width="1" opacity="0.35"/>
  <line x1="320" y1="0" x2="480" y2="0" stroke="#8a9ea8" stroke-width="1.5" opacity="0.5"/>

  <!-- Bright top edge glow (sky reflection) -->
  <line x1="320" y1="0" x2="480" y2="0" stroke="#b0c0c8" stroke-width="2" opacity="0.3"/>

  <!-- A few lit windows (random bright spots) -->
  <g fill="#c8d8e0" opacity="0.6">
    <rect x="345" y="80" width="22" height="15"/>
    <rect x="375" y="115" width="22" height="15"/>
    <rect x="430" y="65" width="22" height="15"/>
    <rect x="348" y="210" width="22" height="15"/>
    <rect x="415" y="190" width="22" height="15"/>
    <rect x="456" y="145" width="22" height="15"/>
    <rect x="332" y="310" width="22" height="15"/>
    <rect x="445" y="280" width="22" height="15"/>
  </g>
  <g fill="#b0c0c8" opacity="0.35">
    <rect x="160" y="180" width="18" height="14"/>
    <rect x="185" y="230" width="18" height="14"/>
    <rect x="555" y="195" width="18" height="14"/>
    <rect x="578" y="260" width="18" height="14"/>
  </g>

  <!-- Ground glow / reflection at bottom -->
  <rect x="0" y="440" width="800" height="93" fill="#101820" opacity="0.6"/>
  <rect x="280" y="500" width="240" height="33" fill="#283040" opacity="0.5"/>
</svg>
